name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Cloudflare Pages' build image runs npm 10.9.2 and installs with
      # `npm ci`. Pin the same npm here and use `npm ci` so this workflow is an
      # exact mirror of the deploy: a lockfile regenerated by a different npm
      # major fails CI on the PR instead of silently breaking production.
      # See CLAUDE.md ("npm version is pinned to Cloudflare's").
      - run: npm i -g npm@10.9.2

      - run: npm ci

      - run: npm run check

      - run: npm run build
