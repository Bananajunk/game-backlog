name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      # --frozen-lockfile mirrors Cloudflare Pages (which installs with the same
      # pinned Bun) and fails the PR if bun.lock drifts, rather than letting the
      # drift reach a deploy. See CLAUDE.md ("Bun is the toolchain").
      - run: bun install --frozen-lockfile

      - run: bun run check

      - run: bun run build
